version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: roz-postgres
    environment:
      POSTGRES_USER: roz
      POSTGRES_PASSWORD: roz_password
      POSTGRES_DB: roz_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roz -d roz_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: roz-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
